name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, type-check, test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # System deps needed by tesseract / opencv / python-magic at import time
      # so mypy and pytest can actually load app modules.
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr tesseract-ocr-spa \
            libmagic1 libgl1 libglib2.0-0

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install project + dev deps
        run: uv sync --dev

      - name: Ruff (lint)
        run: uv run ruff check app tests

      - name: Ruff (format check)
        run: uv run ruff format --check app tests

      - name: Mypy (type-check)
        run: uv run mypy app --ignore-missing-imports  # TODO(mypy): tighten in follow-up

      - name: Pytest
        run: uv run pytest --cov=app --cov-report=term-missing --cov-fail-under=20
