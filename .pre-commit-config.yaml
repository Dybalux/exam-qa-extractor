# Pre-commit hooks — run `uv run pre-commit install` once after cloning.
# Uses the project's own ruff via `uv run` so the hook always matches
# the exact ruff version that CI runs (no version drift).
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types: [python]
        require_serial: true

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
        require_serial: true
